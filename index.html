<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Acronym</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">
        <h1>
            No
            <span class="crossed-out">
                <span id="acronym"></span>
            </span>
            <span class="cursor"> |</span>
        </h1>

        <p>
            Just use the words.
        </p>

        <p>
            Acronyms save a few seconds for the sender.
        </p>

        <p>
            They can cost minutes for everyone else.
        </p>
    </main>

    <script src="script.js"></script>

</body>
</html>
